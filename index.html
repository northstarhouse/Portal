<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>North Star House — Command Center</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://uvzwhhwzelaelfhfkvdb.supabase.co" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      font-size: 16px;
      font-family: 'Calibri', 'Segoe UI', sans-serif;
    }
    #root {
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="assets/app.js?v=1784863136964" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      // updateViaCache: 'none' forces the browser to always fetch sw.js itself fresh from the
      // network on every check, instead of possibly serving a browser-HTTP-cached copy of the
      // service worker script -- without this, an old SW can look "up to date" to the browser
      // even after a new one is deployed, and users get stuck on stale cached content.
      navigator.serviceWorker.register('/Portal/sw.js', { updateViaCache: 'none' });
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (window.__nshSwReloaded) return;
        window.__nshSwReloaded = true;
        window.location.reload();
      });
    }
  </script>
</body>
</html>
